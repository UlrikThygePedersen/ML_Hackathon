name: Python Auto-Format

on: [push]

jobs:
  auto-format:
    runs-on: ubuntu-latest
    # Give the action permission to write/commit changes back to your repository
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Black
        run: pip install black

      # This time we run black WITHOUT "--check", so it actually modifies the files
      - name: Format code with Black
        run: black .

      # Automatically commit and push changes if Black modified any files
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Python code with Black"
