name: Python Auto-Format & Summary

on: [push]

jobs:
  auto-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          pip install black flake8

      # We run flake8 and append its raw output directly into a code block
      - name: Check PEP 8 Style
        run: |
          echo "## 📊 PEP 8 Style Report" >> $GITHUB_STEP_SUMMARY
          echo "```text" >> $GITHUB_STEP_SUMMARY
          flake8 . --max-line-length=127 --exit-zero >> $GITHUB_STEP_SUMMARY 2>&1
          echo "```" >> $GITHUB_STEP_SUMMARY

      # We run black and append its raw output into a code block
      - name: Format code with Black
        run: |
          echo "## 🎨 Black Formatting Summary" >> $GITHUB_STEP_SUMMARY
          echo "```text" >> $GITHUB_STEP_SUMMARY
          black . >> $GITHUB_STEP_SUMMARY 2>&1
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Python code with Black"
