name: Python Auto-Format & Summary

on: [push]

jobs:
  auto-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          pip install black flake8 flake8-markdown

      # This safely injects the header and pipes the flake8 output into the summary
      - name: Check PEP 8 Style
        run: |
          echo "## 📊 PEP 8 Style Report" >> $GITHUB_STEP_SUMMARY
          flake8 . --max-line-length=127 --exit-zero | flake8-markdown >> $GITHUB_STEP_SUMMARY

      # This runs black, saves its text output, and puts it inside a code block cleanly
      - name: Format code with Black
        run: |
          echo "## 🎨 Black Formatting Summary" >> $GITHUB_STEP_SUMMARY
          echo "```text" >> $GITHUB_STEP_SUMMARY
          black . >> $GITHUB_STEP_SUMMARY 2>&1
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Python code with Black"
