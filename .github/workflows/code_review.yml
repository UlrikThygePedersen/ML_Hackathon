name: Python Code Quality

on: [push]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your repository's code onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up a Python environment on the runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.11' # You can change this to your project's version

      # 3. Install Black, Flake8, and pytest
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8
          pip install pytest

      # 4. Run Black in --check mode (fails if code isn't formatted correctly)
      - name: Check diff with Black
        run: black --diff .

      # 5. Run Black in --check mode (fails if code isn't formatted correctly)
      - name: Check formatting with Black
        run: black --check .

      # 6. Run Flake8 to check for PEP 8 errors
      - name: Check PEP 8 compliance with Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. Remove "--exit-zero" if you want PEP8 errors to break the build!
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 7. Run pytest
      - name: Unit tests with pytest
        run: |
          # run unit tests
          pytest