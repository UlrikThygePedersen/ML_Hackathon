name: Code Quality Check

on: [push, pull_request]

jobs:
  lint-code:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      # Step 1: This "checks out" your repository so the runner can see your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Run the Super-Linter to scan the code
      - name: Lint Code Base
        uses: super-linter/super-linter@v5
